<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #2b2b2b; color: white; font-family: sans-serif; padding: 50px; }
  .navbar {
    background: #111;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    border-radius: 0.75rem;
    height: 60px;
  }
  .logo img {
    height: 48px; /* 3rem */
    width: auto;
    border: 1px solid red; /* outline the img box */
    transform: scale(3.2) translateY(-4%);
    transform-origin: left center;
  }
</style>
</head>
<body>
  <div class="navbar">
    <div class="logo">
      <img src="public/logo/logo-with-us-icon-champagne.svg" />
    </div>
  </div>
</body>
</html>
